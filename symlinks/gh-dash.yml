prSections:
    - title: All Pull Requests
      filters: is:open
    - title: My Pull Requests
      filters: is:open author:@me
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
issuesSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Mentioned
      filters: reason:mention
    - title: Participating
      filters: reason:participating
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true  # TODO: change to false after an update, for not it explodes
        width: 0.70
    prsLimit: 20
    prApproveComment: Thanks for fixing it! 🙌
    issuesLimit: 20
    notificationsLimit: 20
    view: prs  # notifications
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}} && lazygit
  prs:
    - key: C
      name: code review
      command: >
        tmux new-window -n PR-{{.RepoName}}-{{.PrNumber}}
        'nvim -c
        ":silent Octo pr edit {{.PrNumber}}"'
    - key: N
      name: Checkout in a worktree
      command: >
        wt switch pr:{{.PrNumber}} -x 'tmux send-keys -t "$(tmux list-sessions -F "#{session_created} #{session_name}" | sort -nr | head -n1 | cut -d" " -f2)" C-m'
    - key: Z
      name: code review using opencode
      command: >
        wt switch pr:{{.PrNumber}} -x 'tmux send-keys -t "$(tmux list-sessions -F "#{session_created} #{session_name}" | sort -nr | head -n1 | cut -d" " -f2)" "opencode -m github-copilot/claude-haiku-4.5 --prompt review-pr-for-this-branch" C-m'
repoPaths: {}
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
pager:
    diff: "diffnav"
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true